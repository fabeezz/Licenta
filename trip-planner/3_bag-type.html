<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Pack your bag - Digital Tailoring</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#1a1c1f",
              error: "#ba1a1a",
              "surface-container-low": "#f3f3f8",
              "on-primary-fixed": "#1b1b1b",
              "on-tertiary-fixed": "#001b3c",
              "error-container": "#ffdad6",
              "tertiary-fixed": "#d5e3ff",
              "surface-container-high": "#e8e8ed",
              "primary-fixed-dim": "#c6c6c6",
              "on-tertiary-fixed-variant": "#1f477b",
              "surface-variant": "#e2e2e7",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#e2e2e2",
              "inverse-on-surface": "#f0f0f5",
              "on-tertiary-container": "#6185bd",
              "on-secondary-fixed-variant": "#474649",
              "surface-tint": "#5e5e5e",
              "on-primary": "#ffffff",
              "tertiary-fixed-dim": "#a7c8ff",
              "surface-bright": "#f9f9fe",
              tertiary: "#000000",
              "on-secondary-container": "#636264",
              "on-error-container": "#93000a",
              surface: "#f9f9fe",
              "on-background": "#1a1c1f",
              "on-secondary-fixed": "#1b1b1d",
              "secondary-fixed": "#e4e2e4",
              secondary: "#5f5e60",
              "surface-container": "#ededf2",
              "on-secondary": "#ffffff",
              "surface-container-highest": "#e2e2e7",
              "surface-dim": "#d9dade",
              "on-tertiary": "#ffffff",
              background: "#f9f9fe",
              "outline-variant": "#cfc4c5",
              "on-surface-variant": "#4c4546",
              "inverse-surface": "#2e3034",
              primary: "#000000",
              "secondary-container": "#e2dfe1",
              "on-primary-container": "#848484",
              "on-primary-fixed-variant": "#474747",
              "tertiary-container": "#001b3c",
              "secondary-fixed-dim": "#c8c6c8",
              "on-error": "#ffffff",
              "inverse-primary": "#c6c6c6",
              "primary-container": "#1b1b1b",
              outline: "#7e7576",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
              "24dp": "24px",
            },
            spacing: {
              "stack-md": "16px",
              "stack-lg": "32px",
              "safe-bottom": "34px",
              "gutter-grid": "12px",
              "margin-page": "20px",
              "stack-sm": "8px",
            },
            fontFamily: {
              "headline-md": ["Inter"],
              "body-md": ["Inter"],
              "nav-title": ["Inter"],
              "body-lg": ["Inter"],
              "label-caps": ["Inter"],
            },
            fontSize: {
              "headline-md": [
                "22px",
                {
                  lineHeight: "28px",
                  letterSpacing: "-0.3px",
                  fontWeight: "600",
                },
              ],
              "body-md": ["15px", { lineHeight: "20px", fontWeight: "400" }],
              "nav-title": [
                "34px",
                {
                  lineHeight: "41px",
                  letterSpacing: "-0.5px",
                  fontWeight: "700",
                },
              ],
              "body-lg": ["17px", { lineHeight: "22px", fontWeight: "400" }],
              "label-caps": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.5px",
                  fontWeight: "600",
                },
              ],
            },
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .material-symbols-outlined.filled {
        font-variation-settings: "FILL" 1;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary selection:text-on-primary"
  >
    <!-- TopAppBar (Transactional / Task Flow) -->
    <header
      class="bg-white/80 dark:bg-neutral-900/80 backdrop-blur-md border-b border-neutral-100 dark:border-neutral-800 sticky top-0 z-40 transition-all duration-300"
    >
      <div class="flex justify-between items-center w-full px-margin-page h-16">
        <button
          class="w-10 h-10 flex items-center justify-center -ml-2 text-black dark:text-white hover:opacity-70 transition-opacity active:scale-95 transition-transform rounded-full"
        >
          <span class="material-symbols-outlined text-[24px]">close</span>
        </button>
        <div class="flex-1 flex justify-center items-center gap-2 px-4">
          <div
            class="h-1 flex-1 max-w-[40px] rounded-full bg-surface-container-high"
          ></div>
          <div
            class="h-1 flex-1 max-w-[40px] rounded-full bg-surface-container-high"
          ></div>
          <div class="h-1 flex-1 max-w-[40px] rounded-full bg-primary"></div>
          <div
            class="h-1 flex-1 max-w-[40px] rounded-full bg-surface-container-high"
          ></div>
        </div>
        <div class="w-10"></div>
        <!-- Spacer for balance -->
      </div>
    </header>
    <main
      class="flex-1 px-margin-page pt-stack-lg pb-safe-bottom max-w-md mx-auto w-full flex flex-col"
    >
      <!-- Header Section -->
      <div class="mb-stack-lg">
        <h1 class="font-nav-title text-nav-title text-on-surface mb-stack-sm">
          Pack your bag
        </h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant">
          How much are you bringing?
        </p>
      </div>
      <!-- Options Container -->
      <div class="flex flex-col gap-stack-md flex-1">
        <!-- Option 1: Selected -->
        <label
          class="relative flex items-start p-5 rounded-24dp border-2 border-primary bg-surface-container-lowest cursor-pointer transition-transform active:scale-[0.98]"
        >
          <input checked="" class="sr-only" name="luggage_type" type="radio" />
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span aria-hidden="true" class="text-2xl">🎒</span>
              <h2 class="font-headline-md text-headline-md text-on-surface">
                Carry-on only
              </h2>
            </div>
            <p class="font-body-md text-body-md text-on-surface-variant ml-8">
              Light packing, fewer outfits
            </p>
          </div>
          <div
            class="flex-shrink-0 w-6 h-6 rounded-full bg-primary flex items-center justify-center mt-1"
          >
            <span class="material-symbols-outlined text-[16px] text-on-primary"
              >check</span
            >
          </div>
        </label>
        <!-- Option 2: Unselected -->
        <label
          class="relative flex items-start p-5 rounded-24dp border border-surface-container-highest bg-surface-container-lowest hover:bg-surface-bright cursor-pointer transition-all active:scale-[0.98]"
        >
          <input class="sr-only" name="luggage_type" type="radio" />
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span aria-hidden="true" class="text-2xl">🧳</span>
              <h2 class="font-headline-md text-headline-md text-on-surface">
                Checked bag
              </h2>
            </div>
            <p class="font-body-md text-body-md text-on-surface-variant ml-8">
              More variety, room for shoes
            </p>
          </div>
          <div
            class="flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline-variant mt-1"
          ></div>
        </label>
        <!-- Option 3: Unselected -->
        <label
          class="relative flex items-start p-5 rounded-24dp border border-surface-container-highest bg-surface-container-lowest hover:bg-surface-bright cursor-pointer transition-all active:scale-[0.98]"
        >
          <input class="sr-only" name="luggage_type" type="radio" />
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <div class="flex -space-x-1">
                <span aria-hidden="true" class="text-2xl relative z-10"
                  >🎒</span
                >
                <span aria-hidden="true" class="text-2xl">🧳</span>
              </div>
              <h2 class="font-headline-md text-headline-md text-on-surface">
                Carry-on + checked
              </h2>
            </div>
            <p class="font-body-md text-body-md text-on-surface-variant ml-10">
              Maximum flexibility for longer trips
            </p>
          </div>
          <div
            class="flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline-variant mt-1"
          ></div>
        </label>
      </div>
      <!-- Footer / Action Area -->
      <div
        class="mt-stack-lg pt-stack-md flex flex-col gap-stack-md bg-surface sticky bottom-0 pb-safe-bottom z-10"
      >
        <!-- Summary Bar -->
        <div
          class="flex items-center justify-center gap-2 py-3 px-4 rounded-full bg-surface-container-low border border-surface-container-highest mx-auto w-max"
        >
          <span
            class="material-symbols-outlined text-[16px] text-on-surface-variant filled"
            >location_on</span
          >
          <span class="font-label-caps text-label-caps text-on-surface-variant"
            >Paris, France · 3 days</span
          >
        </div>
        <!-- Primary Action -->
        <button
          class="w-full py-4 px-6 bg-primary text-on-primary rounded-full font-headline-md text-[17px] font-semibold flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-[0_8px_16px_rgba(0,0,0,0.1)]"
        >
          Continue
          <span class="material-symbols-outlined text-[20px]"
            >arrow_forward</span
          >
        </button>
      </div>
    </main>
    <!-- Navigation Suppressed for Transactional Flow -->
  </body>
</html>
