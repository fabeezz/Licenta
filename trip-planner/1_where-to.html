<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Where to?</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-background": "#1a1c1f",
              error: "#ba1a1a",
              "error-container": "#ffdad6",
              "primary-fixed": "#e2e2e2",
              "on-secondary-fixed": "#1b1b1d",
              "inverse-primary": "#c6c6c6",
              "primary-container": "#1b1b1b",
              "inverse-surface": "#2e3034",
              "secondary-fixed": "#e4e2e4",
              "surface-container-high": "#e8e8ed",
              surface: "#f9f9fe",
              "on-error-container": "#93000a",
              "tertiary-fixed-dim": "#a7c8ff",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              background: "#f9f9fe",
              "surface-container-lowest": "#ffffff",
              "surface-dim": "#d9dade",
              "surface-bright": "#f9f9fe",
              "on-secondary-container": "#636264",
              "surface-container-low": "#f3f3f8",
              "on-primary-fixed-variant": "#474747",
              "on-primary-fixed": "#1b1b1b",
              outline: "#7e7576",
              "on-tertiary-fixed": "#001b3c",
              "on-surface": "#1a1c1f",
              "on-error": "#ffffff",
              tertiary: "#000000",
              "primary-fixed-dim": "#c6c6c6",
              "on-primary-container": "#848484",
              "tertiary-fixed": "#d5e3ff",
              "tertiary-container": "#001b3c",
              "surface-tint": "#5e5e5e",
              "surface-container": "#ededf2",
              "on-surface-variant": "#4c4546",
              "outline-variant": "#cfc4c5",
              "on-secondary-fixed-variant": "#474649",
              "secondary-fixed-dim": "#c8c6c8",
              "secondary-container": "#e2dfe1",
              "surface-variant": "#e2e2e7",
              "on-tertiary-container": "#6185bd",
              "on-tertiary-fixed-variant": "#1f477b",
              secondary: "#5f5e60",
              "on-secondary": "#ffffff",
              primary: "#000000",
              "inverse-on-surface": "#f0f0f5",
              "surface-container-highest": "#e2e2e7",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
              "2xl": "1.5rem",
            },
            spacing: {
              "margin-page": "20px",
              "stack-sm": "8px",
              "stack-lg": "32px",
              "stack-md": "16px",
              "gutter-grid": "12px",
              "safe-bottom": "34px",
            },
            fontFamily: {
              "headline-md": ["Inter"],
              "body-lg": ["Inter"],
              "nav-title": ["Inter"],
              "label-caps": ["Inter"],
              "body-md": ["Inter"],
            },
            fontSize: {
              "headline-md": [
                "22px",
                {
                  lineHeight: "28px",
                  letterSpacing: "-0.3px",
                  fontWeight: "600",
                },
              ],
              "body-lg": ["17px", { lineHeight: "22px", fontWeight: "400" }],
              "nav-title": [
                "34px",
                {
                  lineHeight: "41px",
                  letterSpacing: "-0.5px",
                  fontWeight: "700",
                },
              ],
              "label-caps": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.5px",
                  fontWeight: "600",
                },
              ],
              "body-md": ["15px", { lineHeight: "20px", fontWeight: "400" }],
            },
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      /* Hide scrollbar for clean look */
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background font-body-lg min-h-screen flex flex-col antialiased"
  >
    <!-- Top Header & Progress -->
    <header
      class="px-margin-page pt-stack-md pb-stack-sm flex items-center justify-between sticky top-0 bg-background/90 backdrop-blur-md z-10"
    >
      <button
        aria-label="Close"
        class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high hover:bg-surface-variant transition-colors"
      >
        <span class="material-symbols-outlined text-on-surface">close</span>
      </button>
      <div class="flex items-center gap-1">
        <div class="w-12 h-1.5 rounded-full bg-primary"></div>
        <div class="w-12 h-1.5 rounded-full bg-surface-variant"></div>
        <div class="w-12 h-1.5 rounded-full bg-surface-variant"></div>
        <div class="w-12 h-1.5 rounded-full bg-surface-variant"></div>
      </div>
      <!-- Placeholder to balance the layout -->
      <div class="w-10 h-10"></div>
    </header>
    <!-- Main Content -->
    <main class="flex-1 px-margin-page flex flex-col gap-stack-lg mt-stack-md">
      <!-- Title & Search -->
      <div class="flex flex-col gap-stack-md">
        <h1 class="font-nav-title text-nav-title text-on-background">
          Where to?
        </h1>
        <div class="relative w-full">
          <div
            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
          >
            <span class="material-symbols-outlined text-on-surface-variant"
              >search</span
            >
          </div>
          <input
            class="w-full bg-surface-container-high text-on-background font-body-lg text-body-lg rounded-2xl py-4 pl-12 pr-4 border-none focus:ring-2 focus:ring-primary placeholder:text-on-surface-variant"
            placeholder="Search city or country"
            type="text"
          />
        </div>
      </div>
      <!-- Popular Destinations List -->
      <div class="flex flex-col gap-stack-sm">
        <h2 class="font-headline-md text-headline-md text-on-background mb-2">
          Popular
        </h2>
        <!-- Destination Card 1 -->
        <button
          class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl border border-surface-variant hover:bg-surface-container-low transition-colors w-full text-left"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-2xl"
            >
              🇫🇷
            </div>
            <div class="flex flex-col">
              <span
                class="font-headline-md text-[17px] leading-tight text-on-background"
                >Paris</span
              >
              <span class="font-body-md text-body-md text-on-surface-variant"
                >France</span
              >
            </div>
          </div>
          <span class="material-symbols-outlined text-on-surface-variant"
            >chevron_right</span
          >
        </button>
        <!-- Destination Card 2 -->
        <button
          class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl border border-surface-variant hover:bg-surface-container-low transition-colors w-full text-left"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-2xl"
            >
              🇯🇵
            </div>
            <div class="flex flex-col">
              <span
                class="font-headline-md text-[17px] leading-tight text-on-background"
                >Tokyo</span
              >
              <span class="font-body-md text-body-md text-on-surface-variant"
                >Japan</span
              >
            </div>
          </div>
          <span class="material-symbols-outlined text-on-surface-variant"
            >chevron_right</span
          >
        </button>
        <!-- Destination Card 3 -->
        <button
          class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl border border-surface-variant hover:bg-surface-container-low transition-colors w-full text-left"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-2xl"
            >
              🇺🇸
            </div>
            <div class="flex flex-col">
              <span
                class="font-headline-md text-[17px] leading-tight text-on-background"
                >New York</span
              >
              <span class="font-body-md text-body-md text-on-surface-variant"
                >United States</span
              >
            </div>
          </div>
          <span class="material-symbols-outlined text-on-surface-variant"
            >chevron_right</span
          >
        </button>
        <!-- Destination Card 4 -->
        <button
          class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl border border-surface-variant hover:bg-surface-container-low transition-colors w-full text-left"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-2xl"
            >
              🇬🇧
            </div>
            <div class="flex flex-col">
              <span
                class="font-headline-md text-[17px] leading-tight text-on-background"
                >London</span
              >
              <span class="font-body-md text-body-md text-on-surface-variant"
                >United Kingdom</span
              >
            </div>
          </div>
          <span class="material-symbols-outlined text-on-surface-variant"
            >chevron_right</span
          >
        </button>
        <!-- Destination Card 5 -->
        <button
          class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl border border-surface-variant hover:bg-surface-container-low transition-colors w-full text-left mb-6"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-2xl"
            >
              🇮🇩
            </div>
            <div class="flex flex-col">
              <span
                class="font-headline-md text-[17px] leading-tight text-on-background"
                >Bali</span
              >
              <span class="font-body-md text-body-md text-on-surface-variant"
                >Indonesia</span
              >
            </div>
          </div>
          <span class="material-symbols-outlined text-on-surface-variant"
            >chevron_right</span
          >
        </button>
      </div>
    </main>
    <!-- Bottom Action Area -->
    <div
      class="px-margin-page pb-safe-bottom pt-4 mt-auto bg-background/90 backdrop-blur-md sticky bottom-0 border-t border-surface-variant"
    >
      <!-- Disabled state button as requested -->
      <button
        class="w-full bg-surface-container-highest text-on-surface-variant font-headline-md text-[17px] rounded-2xl py-4 flex items-center justify-center gap-2 opacity-70 cursor-not-allowed"
        disabled=""
      >
        Continue
        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
      </button>
    </div>
  </body>
</html>
